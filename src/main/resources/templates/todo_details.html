<!DOCTYPE html>
<html lang="en"
      layout:decorate="~{default}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content">
  <div class="col-6" th:object="${todo}">
    <form method="post" action="/todo-update">
      <input type="hidden" name="id" th:value="${todo.getId()}">
      <div class="row mt-3">
        <div class="col-12">
          <label>NAME:</label>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12">
          <input type="text" name="name" class="form-control" th:value="${todo.getName()}">
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12">
          <label>deadlineDate:</label>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12">
          <input type="date" name="deadlineDate" class="form-control" th:value="${todo.getDeadlineDate()}">
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12">
          <button class="btn btn-sm btn-success">UPDATE TODO</button>
        </div>
      </div>
    </form>

    <form method="post" action="/todo-delete" class="mt-3" style="margin-left: 2px">
      <input type="hidden" th:value="${todo.getId()}" name="id">
      <button class="btn btn-sm btn-danger">DELETE</button>
    </form>
  </div>
</div>
</body>
</html>
